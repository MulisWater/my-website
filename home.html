<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阿水的小窝</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>

        /* ===== 漂浮星光粒子 ===== */
@keyframes floatStar {
    0% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
    50% { transform: translateY(-25px) translateX(12px); opacity: 0.7; }
    100% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
}

.star-particle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    filter: blur(1px);
    pointer-events: none;
    z-index: 0;
    animation: floatStar 10s infinite ease-in-out;
}
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 极光背景 ===== */
        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(72, 255, 200, 0.30) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 20%, rgba(160, 120, 255, 0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(255, 180, 120, 0.30) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 90%, rgba(100, 220, 255, 0.25) 0%, transparent 45%),
                linear-gradient(145deg, #0b2a35 0%, #1a3a45 40%, #2a4a4a 70%, #3a3a2a 100%);
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 30px 20px 60px 20px;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            max-width: 960px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .navbar .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff4e6;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .navbar .logo span {
            color: #f9d976;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 240, 0.70);
            font-weight: 500;
            font-size: 15px;
            padding: 6px 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.10);
            color: #fff4e6;
        }

        .nav-links a.active {
            background: rgba(249, 217, 118, 0.20);
            color: #f9d976;
        }

        /* ===== 主容器 - 交错布局 ===== */
        .container {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        /* 四个板块交错比例：第一行 60%/40%，第二行 44%/56% */
        .container .section:nth-child(1) { flex: 3 0 0; }
        .container .section:nth-child(2) { flex: 2 0 0; }
        .container .section:nth-child(3) { flex: 4 0 0; }
        .container .section:nth-child(4) { flex: 5 0 0; }

        /* ===== 板块卡片通用样式 ===== */
        .section {
            padding: 28px 24px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(14px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .section:hover {
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 240, 0.60);
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.15), transparent);
        }

        /* ========================================
                   板块一：介绍（两人切换 + 圆形头像）
                   ======================================== */
        .intro-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* ===== 超迷你图片图标按钮（右上角） ===== */
        .mini-social {
            position: absolute;
            top: -50px;
            right: 16px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .mini-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            text-decoration: none;
            overflow: hidden;
        }

        .mini-btn img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
        }

        .mini-btn:hover {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.20);
            transform: translateY(-2px);
        }

        /* 头像双人组 */
        .avatars {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            height: 100px;
        }

        .avatar-item {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.08);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            cursor: pointer;
        }

        .avatar-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-item.active {
            transform: scale(1.25);
            border-color: #f9d976;
            box-shadow: 0 0 30px rgba(249, 217, 118, 0.25);
            background: rgba(249, 217, 118, 0.08);
        }

        .avatar-item.inactive {
            transform: scale(0.85);
            opacity: 0.4;
            filter: grayscale(0.6);
        }

        /* 连接线 */
        .avatars::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(249, 217, 118, 0.20), transparent);
            transform: translateY(-50%);
            z-index: -1;
        }

        .intro-text {
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            padding: 10px 0;
        }

        .intro-name {
            font-size: 28px;
            font-weight: 700;
            color: #fff4e6;
            margin-bottom: 4px;
        }

        .intro-desc {
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.75);
            line-height: 1.9;
            max-width: 500px;
            margin: 0 auto;
        }

        .intro-desc strong {
            color: #f9d976;
            font-weight: 600;
        }

        /* ========================================
                   板块二：音乐播放器
                   ======================================== */
        .music-player {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .music-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .music-cover {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f9d976, #f39b7b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(243, 155, 123, 0.25);
        }

        .music-meta {
            flex: 1;
        }

        .music-meta .track {
            font-size: 17px;
            font-weight: 600;
            color: #fff4e6;
        }

        .music-meta .artist {
            font-size: 13px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.50);
        }

        .music-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .music-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: #fff4e6;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .music-btn svg {
            display: block;
            pointer-events: none;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.10);
            transform: scale(1.05);
        }

        .music-btn.playing {
            border-color: rgba(249, 217, 118, 0.40);
            box-shadow: 0 0 20px rgba(249, 217, 118, 0.10);
        }

        .music-progress {
            flex: 1;
            min-width: 80px;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.10);
            cursor: pointer;
            position: relative;
        }

        .music-progress .bar {
            width: 0%;
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #f9d976, #f39b7b);
            transition: width 0.1s linear;
        }

        .music-time {
            font-size: 13px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.40);
            font-variant-numeric: tabular-nums;
            min-width: 90px;
            text-align: right;
        }

        /* 音量滑块 */
        #volumeSlider {
            width: 64px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            outline: none;
            transition: width 0.2s ease;
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f9d976, #f39b7b);
            cursor: pointer;
        }
        #volumeSlider:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* 歌词容器 */
        .lyrics-container {
            max-height: 120px;
            overflow-y: auto;
            margin-top: 12px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            scroll-behavior: smooth;
        }

        .lyrics-container::-webkit-scrollbar {
            width: 3px;
        }
        .lyrics-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .lyric-line {
            padding: 6px 0;
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.35);
            text-align: center;
            transition: all 0.3s ease;
            line-height: 1.6;
            opacity: 0.5;
        }

        .lyric-line.active {
            color: #f9d976;
            font-weight: 600;
            font-size: 15px;
            opacity: 1;
            text-shadow: 0 0 20px rgba(249, 217, 118, 0.15);
        }

        /* ========================================
                   板块三：时间
                   ======================================== */
        .time-display {
            text-align: center;
            padding: 10px 0;
        }

        .time-mode-toggle {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .time-mode-btn {
            padding: 6px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: transparent;
            color: rgba(255, 255, 240, 0.45);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .time-mode-btn:hover {
            color: rgba(255, 255, 240, 0.75);
        }

        .time-mode-btn.active {
            background: rgba(249, 217, 118, 0.12);
            border-color: rgba(249, 217, 118, 0.25);
            color: #f9d976;
        }

        .time-number {
            font-size: 48px;
            font-weight: 700;
            color: #fff4e6;
            letter-spacing: 4px;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(249, 217, 118, 0.10);
        }

        .time-number .unit {
            font-size: 20px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.40);
            margin-left: 6px;
        }

        .time-label {
            font-size: 15px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.45);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .time-switch-container {
            display: none;
        }

        .time-switch-container.active {
            display: block;
        }

        /* ========================================
                   板块四：小纸条
                   ======================================== */
        .note-area {
            text-align: center;
            padding: 8px 0;
        }

        .note-display {
            font-size: 22px;
            font-weight: 400;
            color: #fff4e6;
            line-height: 1.8;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.06);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .note-display .quote-mark {
            color: rgba(249, 217, 118, 0.30);
            font-size: 32px;
            font-weight: 300;
            margin: 0 6px;
        }

        .note-btn {
            padding: 12px 40px;
            border-radius: 60px;
            border: none;
            background: linear-gradient(135deg, #f9d976, #f39b7b);
            color: #1a2a2a;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 8px 28px rgba(243, 155, 123, 0.25);
        }

        .note-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 36px rgba(243, 155, 123, 0.40);
        }

        .note-btn:active {
            transform: scale(0.96);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                padding: 14px 20px;
                border-radius: 32px;
            }
            .nav-links {
                gap: 8px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-links a {
                font-size: 14px;
                padding: 4px 14px;
            }
        }

        @media (max-width: 640px) {
            .container {
                flex-direction: column;
                gap: 20px;
                padding: 0 4px;
            }
            .container .section {
                flex: 0 0 100%;
                width: 100%;
            }
            .section {
                padding: 22px 18px;
                border-radius: 28px;
            }
            .time-number {
                font-size: 36px;
            }
            .intro-name {
                font-size: 22px;
            }
            .note-display {
                font-size: 18px;
                min-height: 60px;
                padding: 16px;
            }
            .music-controls {
                gap: 10px;
            }
            .music-progress {
                min-width: 60px;
            }
            .music-time {
                font-size: 12px;
                min-width: 70px;
            }
            .avatar-item {
                width: 60px;
                height: 60px;
            }
            .avatars {
                gap: 20px;
                height: 80px;
                max-width: 200px;
            }
            .mini-social {
                top: 8px;
                right: 12px;
            }
            .mini-btn {
                width: 28px;
                height: 28px;
            }
            .mini-btn img {
                width: 16px;
                height: 16px;
            }
        }

        @media (max-width: 400px) {
            .time-number {
                font-size: 28px;
            }
            .section-title {
                font-size: 15px;
            }
            .avatar-item {
                width: 50px;
                height: 50px;
            }
            .avatars {
                gap: 16px;
                height: 70px;
                max-width: 160px;
            }
        }

        /* ===== 鼠标光晕 ===== */
#cursor-glow {
    position: fixed;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(249, 217, 118, 0.20) 0%, rgba(160, 120, 255, 0.06) 45%, transparent 70%);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    will-change: left, top;
}

/* ===== 小纸条优化 ===== */

/* 纸条计数 */
.note-count {
    display: inline-block;
    margin-bottom: 12px;
    font-size: 13px;
    font-weight: 300;
    color: rgba(255, 255, 240, 0.30);
    letter-spacing: 1px;
}

.note-count span {
    color: #f9d976;
    font-weight: 600;
}

/* 打字光标闪烁 */
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}

.cursor-blink {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #f9d976;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.7s step-end infinite;
}

/* 纸条飘落动画 */
@keyframes paperFall {
    0% {
        opacity: 0;
        transform: translateY(-30px) scale(0.92) rotate(-3deg);
    }
    60% {
        opacity: 1;
        transform: translateY(4px) scale(1.01) rotate(1deg);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
    }
}

.note-display {
    animation: paperFall 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
}

    </style>
</head>
<body>

    <!-- 鼠标光晕 -->
<div id="cursor-glow"></div>

    <!-- ===== 导航栏 ===== -->
    <nav class="navbar">
        <a href="index.html" class="logo">☀️ 阿水<span>的小窝</span></a>
        <ul class="nav-links">
            <li><a href="home.html" class="active">首页</a></li>
            <li><a href="muliswater.html">文章</a></li>
            <li><a href="photos.html">照片墙</a></li>
        </ul>
    </nav>

    <!-- ===== 主容器 ===== -->
    <div class="container">

        <!-- ========================================
        板块一：介绍
        ======================================== -->
        <section class="section">
            <div class="section-title">✦ 关于阿水</div>

            <div class="intro-container">
                <!-- 双人头像 -->
                <div class="avatars" id="avatarContainer">
                    <div class="avatar-item active" id="avatarA">
                        <img src="jpg/Image_1781721823920.jpg" alt="阿水头像" />
                    </div>
                    <div class="avatar-item inactive" id="avatarB">
                        <img src="jpg/Image_1781721782642.jpg" alt="小星头像" />
                    </div>
                </div>

                <!-- 文字内容 -->
                <div class="intro-text" id="introText">
                    <div class="intro-name" id="introName">阿水</div>
                    <div class="intro-desc" id="introDesc">
                        一个喜欢在深夜写代码、在清晨看日出的 <strong>前端自学者</strong>。<br />
                        相信极光会在最冷的夜里出现，也相信温暖藏在每一行代码里。
                    </div>
                </div>

                <!-- 迷你社交按钮（右上角） -->
                <div class="mini-social">
                    <a href="https://github.com/MulisWater" class="mini-btn">
                        <img src="jpg/github.jpg" alt="GitHub" />
                    </a>
                    <a href="https://space.bilibili.com/1384996175" target="_blank" class="mini-btn">
                        <img src="jpg/bilibili.jpg" alt="Bilibili" />
                    </a>
                </div>
            </div>
        </section>

        <!-- ========================================
        板块二：音乐播放器
        ======================================== -->
        <section class="section">
            <div class="section-title">♪ 正在播放</div>

            <div class="music-player">
                <div class="music-info">
                    <div class="music-cover">
                        <img src="jpg/Screenshot_2026-06-18-03-57-48-62_149003a2d400f6a.jpg" alt="封面" style="width:100%; height:100%; object-fit:cover; border-radius:16px;" />
                    </div>
                    <div class="music-meta">
                        <div class="track" id="trackName">极光与晚风</div>
                        <div class="artist" id="artistName">阿水 · 小窝</div>
                    </div>
                </div>

                <div class="music-controls">
                    <button class="music-btn" id="prevBtn" title="上一首">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><rect x="5" y="4" width="2" height="16"/></svg>
                    </button>
                    <button class="music-btn" id="playBtn" title="播放/暂停">
                        <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                    <button class="music-btn" id="nextBtn" title="下一首">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><rect x="17" y="4" width="2" height="16"/></svg>
                    </button>
                    <div class="music-progress" id="progressContainer">
                        <div class="bar" id="progressBar"></div>
                    </div>
                    <button class="music-btn volume-toggle" id="volumeToggle" title="静音/取消静音">

                            <path d="M3 9v6h4l5 5V4L7 9H3z"/>

        function loadTrack(index) {
            var song = playlist[index];
            trackName.textContent = song.track;
            artistName.textContent = song.artist;
            audio.src = song.src;
            currentLyrics = song.lyrics || [];
            renderLyrics(currentLyrics);
            audio.load();
            audio.play().then(function() {
                updatePlayButton(true);
            }).catch(function() {
                updatePlayButton(false);
            });
            var coverEl = document.querySelector('.music-cover');
            if (song.cover) {
                if (song.cover.match(/\.(jpg|jpeg|png|webp|gif)$/i) || song.cover.startsWith('http')) {
                    coverEl.innerHTML = '<img src="' + song.cover + '" alt="封面" style="width:100%;height:100%;object-fit:cover;border-radius:16px;" />';
                } else {
                    coverEl.textContent = song.cover;
                }
            } else {
                coverEl.textContent = '🎵';
            }
        }

        function renderLyrics(lyrics) {
            lyricsWrapper.innerHTML = '';
            if (!lyrics || lyrics.length === 0) {
                lyricsWrapper.innerHTML = '<div style="text-align:center;color:rgba(255,255,240,0.2);font-size:13px;padding:20px 0;">暂无歌词</div>';
                return;
            }
            lyrics.forEach(function(item) {
                var line = document.createElement('div');
                line.className = 'lyric-line';
                line.textContent = item[1];
                line.dataset.time = item[0];
                lyricsWrapper.appendChild(line);
            });
        }

        function updatePlayButton(playing) {
            var icon = document.getElementById('playIcon');
            if (playing) {
                icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
                playBtn.classList.add('playing');
            } else {
                icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
                playBtn.classList.remove('playing');
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '00:00';
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        playBtn.addEventListener('click', function() {
            if (audio.paused) {
                audio.play().catch(function() {});
            } else {
                audio.pause();
            }
        });

        audio.addEventListener('play', function() { updatePlayButton(true); });
        audio.addEventListener('pause', function() { updatePlayButton(false); });

        audio.addEventListener('timeupdate', function() {
            var currentTime = audio.currentTime;
            var lines = lyricsWrapper.querySelectorAll('.lyric-line');
            var activeIndex = -1;
            for (var i = lines.length - 1; i >= 0; i--) {
                var time = parseFloat(lines[i].dataset.time);
                if (time <= currentTime) {
                    activeIndex = i;
                    break;
                }
            }
            lines.forEach(function(line, index) {
                line.classList.toggle('active', index === activeIndex);
            });
            if (activeIndex >= 0) {
                var activeLine = lines[activeIndex];
                var container = document.getElementById('lyricsContainer');
                var offsetTop = activeLine.offsetTop - (container.clientHeight / 2 - 16) + activeLine.clientHeight / 2 - 230;
                container.scrollTop = offsetTop;
            }
            if (audio.duration) {
                var percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + '%';
                timeDisplay.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
            }
        });

        progressContainer.addEventListener('click', function(e) {
            var rect = this.getBoundingClientRect();
            var x = (e.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = x * audio.duration;
            }
        });

        prevBtn.addEventListener('click', function() {
            currentIndexMusic = (currentIndexMusic - 1 + playlist.length) % playlist.length;
            loadTrack(currentIndexMusic);
        });

        nextBtn.addEventListener('click', function() {
            currentIndexMusic = (currentIndexMusic + 1) % playlist.length;
            loadTrack(currentIndexMusic);
        });

        audio.addEventListener('ended', function() {
            currentIndexMusic = (currentIndexMusic + 1) % playlist.length;
            loadTrack(currentIndexMusic);
        });

        loadTrack(0);

        // ========================================
        // 3. 时间板块
        // ========================================
        var anniversary = new Date(2026, 9, 14);
        var startDate = new Date(2025, 9, 14);

        var countdownDaysEl = document.getElementById('countdownDays');
        var togetherDaysEl = document.getElementById('togetherDays');
        var modeBtns = document.querySelectorAll('.time-mode-btn');
        var modeContainers = {
            countdown: document.getElementById('mode-countdown'),
            together: document.getElementById('mode-together')
        };

        function updateTime() {
            var now = new Date();
            var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            var nextAnniversary = new Date(today.getFullYear(), anniversary.getMonth(), anniversary.getDate());
            if (nextAnniversary < today) {
                nextAnniversary.setFullYear(nextAnniversary.getFullYear() + 1);
            }

            var diffMs = nextAnniversary - now;
            var totalSec = Math.floor(diffMs / 1000);
            var d = Math.floor(totalSec / 86400);
            var h = Math.floor((totalSec % 86400) / 3600);
            var m = Math.floor((totalSec % 3600) / 60);
            var s = totalSec % 60;
            countdownDaysEl.textContent =
                String(d).padStart(2, '0') + ':' +
                String(h).padStart(2, '0') + ':' +
                String(m).padStart(2, '0') + ':' +
                String(s).padStart(2, '0');

            var startDay = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
            var diffTogetherMs = now - startDay;
            var totalSec2 = Math.floor(diffTogetherMs / 1000);
            var d2 = Math.floor(totalSec2 / 86400);
            var h2 = Math.floor((totalSec2 % 86400) / 3600);
            var m2 = Math.floor((totalSec2 % 3600) / 60);
            var s2 = totalSec2 % 60;
            togetherDaysEl.textContent =
                String(d2).padStart(2, '0') + ':' +
                String(h2).padStart(2, '0') + ':' +
                String(m2).padStart(2, '0') + ':' +
                String(s2).padStart(2, '0');
        }

        modeBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                modeBtns.forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                var mode = this.getAttribute('data-mode');
                for (var key in modeContainers) {
                    modeContainers[key].classList.remove('active');
                }
                if (modeContainers[mode]) {
                    modeContainers[mode].classList.add('active');
                }
            });
        });

        updateTime();
        setInterval(updateTime, 1000);

        noteBtn.addEventListener('click', function() {
            if (isTyping) return;
            var randomIndex = Math.floor(Math.random() * notes.length);
            var picked = notes[randomIndex];
            var currentCount = parseInt(countNum.textContent) || 0;
            countNum.textContent = currentCount + 1;
            typeText(picked);
        });

        function typeText(text) {
            isTyping = true;
            // 固定引号框架，中间留空
            noteDisplay.innerHTML = '<span class="quote-mark">「</span><span class="quote-text"></span><span class="quote-mark">」</span>';
            var textSpan = noteDisplay.querySelector('.quote-text');
            var i = 0;

            function typeChar() {
                if (i < text.length) {
                    textSpan.textContent += text[i];
                    i++;
                    setTimeout(typeChar, 45 + Math.random() * 20);
                } else {
                    isTyping = false;
                }
            }
            typeChar();
        }


        // ========================================
        // 5. 音量控制
        // ========================================
        var volumeSlider = document.getElementById('volumeSlider');
        var volumeToggle = document.getElementById('volumeToggle');
        var isMuted = false;
        var lastVolume = 0.8;

        volumeSlider.addEventListener('input', function() {
            var val = parseFloat(this.value);
            audio.volume = val;
            isMuted = false;
            updateVolumeIcon(val);
        });

        volumeToggle.addEventListener('click', function() {
            if (isMuted) {
                audio.volume = lastVolume;
                volumeSlider.value = lastVolume;
                isMuted = false;
            } else {
                lastVolume = audio.volume;
                audio.volume = 0;
                volumeSlider.value = 0;
                isMuted = true;
            }
            updateVolumeIcon(audio.volume);
        });

        function updateVolumeIcon(val) {
            var high = document.getElementById('volumeHigh');
            if (val === 0) {
                high.setAttribute('d', 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM20 12l2-2m0 4l-2-2');
            } else {
                high.setAttribute('d', 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z');
            }
        }
        

// ========================================
// 彩蛋：生成漂浮星光
// ========================================
function createStars() {
    var container = document.body;
    for (var i = 0; i < 25; i++) {
        var star = document.createElement('div');
        star.className = 'star-particle';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = (Math.random() * 3 + 2) + 'px';
        star.style.height = star.style.width;
        star.style.animationDuration = (Math.random() * 8 + 6) + 's';
        star.style.animationDelay = (Math.random() * 5) + 's';
        star.style.opacity = Math.random() * 0.4 + 0.1;
        container.appendChild(star);
    }
}
createStars();

// ========================================
// 鼠标光晕（独立版本）
// ========================================
(function() {
    var glow = document.getElementById('cursor-glow');
    if (!glow) {
        console.warn('找不到 #cursor-glow 元素');
        return;
    }
    var isFirstMove = true;

    document.addEventListener('mousemove', function(e) {
        // 直接设置 left 和 top，不依赖任何其他变量
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
        if (isFirstMove) {
            console.log('鼠标光晕已激活');
            isFirstMove = false;
        }
    });

    // 如果鼠标从未移动，至少初始位置在屏幕中央（非必须）
    glow.style.left = window.innerWidth / 2 + 'px';
    glow.style.top = window.innerHeight / 2 + 'px';
})();
    </script>

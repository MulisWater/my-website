<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阿水的小窝</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 极光背景 ===== */
        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(72, 255, 200, 0.30) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 20%, rgba(160, 120, 255, 0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(255, 180, 120, 0.30) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 90%, rgba(100, 220, 255, 0.25) 0%, transparent 45%),
                linear-gradient(145deg, #0b2a35 0%, #1a3a45 40%, #2a4a4a 70%, #3a3a2a 100%);
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 30px 20px 60px 20px;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            max-width: 960px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .navbar .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff4e6;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .navbar .logo span {
            color: #f9d976;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 240, 0.70);
            font-weight: 500;
            font-size: 15px;
            padding: 6px 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.10);
            color: #fff4e6;
        }

        .nav-links a.active {
            background: rgba(249, 217, 118, 0.20);
            color: #f9d976;
        }

        /* ===== 主容器 ===== */
        .container {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.3fr 1fr;  /* 左列占2份，右列占1份，左边长 */
    gap: 24px;
}
/* ===== 平板（宽度小于 900px） ===== */
@media (max-width: 900px) {
    .container {
        grid-template-columns: 1.5fr 1fr; /* 稍微缩小左右差距 */
        gap: 18px;
    }
}

/* ===== 手机（宽度小于 640px） ===== */
@media (max-width: 640px) {
    .container {
        grid-template-columns: 1fr; /* 改为单列，上下排列 */
        gap: 20px;
        padding: 0 4px; /* 防止贴边 */
    }
}

        /* ===== 板块卡片通用样式 ===== */
        .section {
            padding: 32px 36px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(14px);
            border-radius: 40px;
            padding: 32px 36px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
            padding: 28px 24px;
            section {
        padding: 22px 18px; /* 手机缩小内边距 */
    }
        }

        .section:hover {
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 240, 0.60);
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.15), transparent);
        }

        /* ========================================
                   板块一：介绍（两人切换 + 圆形头像）
                   ======================================== */
        .intro-container {
    position: relative;   /* ← 加上这一行 */
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}

        /* 头像双人组 */
        .avatars {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            height: 100px;
        }

        .avatar-item {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden; /* 确保图片被裁剪成圆形 */
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.08);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            .avatar-item {
            cursor: pointer;   
}
        }

        .avatar-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 图片覆盖整个容器，不拉伸 */
            display: block;
        }

        .avatar-item.active {
            transform: scale(1.25);
            border-color: #f9d976;
            box-shadow: 0 0 30px rgba(249, 217, 118, 0.25);
            background: rgba(249, 217, 118, 0.08);
        }

        .avatar-item.inactive {
            transform: scale(0.85);
            opacity: 0.4;
            filter: grayscale(0.6);
        }

        /* 连接线（装饰） */
        .avatars::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(249, 217, 118, 0.20), transparent);
            transform: translateY(-50%);
            z-index: -1;
        }

        /* 名字 + 描述卡片 */
        .intro-text {
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            padding: 10px 0;
        }

        .intro-name {
            font-size: 28px;
            font-weight: 700;
            color: #fff4e6;
            margin-bottom: 4px;
            transition: all 0.3s ease;
        }

        .intro-desc {
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.75);
            line-height: 1.9;
            max-width: 500px;
            margin: 0 auto;
        }

        .intro-desc strong {
            color: #f9d976;
            font-weight: 600;
        }

        /* 切换按钮 */
        /* 切换按钮 - 右上角小圆形 */
.intro-switch-btn {
    position: absolute;
    top: 18px;
    right: 22px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.10);
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(4px);
    color: rgba(255, 255, 240, 0.50);
    font-size: 18px;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    padding: 0;
    box-shadow: none;
}

.intro-switch-btn:hover {
    background: rgba(255, 255, 255, 0.10);
    color: #f9d976;
    border-color: rgba(249, 217, 118, 0.25);
    transform: rotate(60deg) scale(1.05);
}

.intro-switch-btn:active {
    transform: scale(0.90);
}

        

        /* ========================================
                   板块二：音乐播放器（不变）
                   ======================================== */
        .music-player {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .music-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .music-cover {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f9d976, #f39b7b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(243, 155, 123, 0.25);
        }

        .music-meta {
            flex: 1;
        }

        .music-meta .track {
            font-size: 17px;
            font-weight: 600;
            color: #fff4e6;
        }

        .music-meta .artist {
            font-size: 13px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.50);
        }

        .music-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .music-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: #fff4e6;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.10);
            transform: scale(1.05);
        }

        .music-btn.playing {
            border-color: rgba(249, 217, 118, 0.40);
            box-shadow: 0 0 20px rgba(249, 217, 118, 0.10);
        }

        .music-progress {
            flex: 1;
            min-width: 120px;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.10);
            cursor: pointer;
            position: relative;
        }
        .music-btn svg {
    display: block;     /* 去掉行内元素的幽灵间距 */
    pointer-events: none; /* 点击穿透，让点击事件落在按钮上 */
}

        .music-progress .bar {
            width: 0%;
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #f9d976, #f39b7b);
            transition: width 0.1s linear;
        }

        .music-time {
            font-size: 13px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.40);
            font-variant-numeric: tabular-nums;
            min-width: 90px;
            text-align: right;
        }

        /* ========================================
                   板块三：时间（不变）
                   ======================================== */
        .time-display {
            text-align: center;
            padding: 10px 0;
        }

        .time-mode-toggle {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .time-mode-btn {
            padding: 6px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: transparent;
            color: rgba(255, 255, 240, 0.45);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .time-mode-btn:hover {
            color: rgba(255, 255, 240, 0.75);
        }

        .time-mode-btn.active {
            background: rgba(249, 217, 118, 0.12);
            border-color: rgba(249, 217, 118, 0.25);
            color: #f9d976;
        }

        .time-number {
            font-size: 64px;
            font-weight: 700;
            color: #fff4e6;
            letter-spacing: 4px;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(249, 217, 118, 0.10);
        }

        .time-number .unit {
            font-size: 22px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.40);
            margin-left: 6px;
        }

        .time-label {
            font-size: 15px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.45);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .time-switch-container {
            display: none;
        }

        .time-switch-container.active {
            display: block;
        }

        /* ========================================
                   板块四：小纸条（不变）
                   ======================================== */
        .note-area {
            text-align: center;
            padding: 8px 0;
        }

        .note-display {
            font-size: 22px;
            font-weight: 400;
            color: #fff4e6;
            line-height: 1.8;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.06);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .note-display .quote-mark {
            color: rgba(249, 217, 118, 0.30);
            font-size: 32px;
            font-weight: 300;
            margin: 0 6px;
        }

        .note-btn {
            padding: 12px 40px;
            border-radius: 60px;
            border: none;
            background: linear-gradient(135deg, #f9d976, #f39b7b);
            color: #1a2a2a;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 8px 28px rgba(243, 155, 123, 0.25);
        }

        .note-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 36px rgba(243, 155, 123, 0.40);
        }

        .note-btn:active {
            transform: scale(0.96);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                padding: 14px 20px;
                border-radius: 32px;
            }
            .nav-links {
                gap: 8px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-links a {
                font-size: 14px;
                padding: 4px 14px;
            }
            .section {
                padding: 22px 20px;
                border-radius: 28px;
            }
            .time-number {
                font-size: 42px;
            }
            .intro-name {
                font-size: 22px;
            }
            .note-display {
                font-size: 18px;
                min-height: 60px;
                padding: 16px;
            }
            .music-controls {
                gap: 10px;
            }
            .music-progress {
                min-width: 80px;
            }
            .music-time {
                font-size: 12px;
                min-width: 70px;
            }
            .avatar-item {
                width: 60px;
                height: 60px;
            }
            .avatars {
                gap: 20px;
                height: 80px;
                max-width: 200px;
            }
        }

        @media (max-width: 400px) {
            .time-number {
                font-size: 32px;
            }
            .section-title {
                font-size: 15px;
            }
            .avatar-item {
                width: 50px;
                height: 50px;
            }
            .avatars {
                gap: 16px;
                height: 70px;
                max-width: 160px;
            }
        }
        /* 音量滑块 */
#volumeSlider {
    width: 64px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 4px;
    outline: none;
    transition: width 0.2s ease;
}
#volumeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f9d976, #f39b7b);
    cursor: pointer;
}
#volumeSlider:hover {
    background: rgba(255, 255, 255, 0.25);
}
/* 歌词容器 - 固定高度，可滚动 */
.lyrics-container {
    max-height: 120px;
    overflow-y: auto;
    margin-top: 12px;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    scroll-behavior: smooth; /* 平滑滚动 */
}

/* 隐藏滚动条（保持干净） */
.lyrics-container::-webkit-scrollbar {
    width: 3px;
}
.lyrics-container::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 4px;
}

/* 歌词行 */
.lyric-line {
    padding: 6px 0;
    font-size: 14px;
    font-weight: 300;
    color: rgba(255, 255, 240, 0.35);
    text-align: center;
    transition: all 0.3s ease;
    line-height: 1.6;
    opacity: 0.5;
}

/* 当前播放的高亮行 */
.lyric-line.active {
    color: #f9d976;
    font-weight: 600;
    font-size: 15px;
    opacity: 1;
    text-shadow: 0 0 20px rgba(249, 217, 118, 0.15);
}
    </style>
</head>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link href="https://fonts.loli.net/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阿水的小窝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 动画定义区 ===== */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes glowPulse {
            0% {
                text-shadow: 0 0 20px rgba(255, 200, 120, 0.20);
            }
            50% {
                text-shadow: 0 0 45px rgba(255, 200, 120, 0.50), 0 0 80px rgba(160, 120, 255, 0.15);
            }
            100% {
                text-shadow: 0 0 20px rgba(255, 200, 120, 0.20);
            }
        }

        @keyframes shimmerLine {
            0% {
                background-position: -200% center;
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
            100% {
                background-position: 200% center;
                opacity: 0.5;
            }
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(72, 255, 200, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(160, 120, 255, 0.40) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(255, 180, 120, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 10% 90%, rgba(100, 220, 255, 0.30) 0%, transparent 50%),
                linear-gradient(145deg, #0b2a35 0%, #1a3a45 40%, #2a4a4a 70%, #3a3a2a 100%);
            background-blend-mode: normal, normal, normal, normal, normal;
            font-family: 'Nunito', 'Quicksand', "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(80, 255, 210, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(180, 140, 255, 0.20) 0%, transparent 45%);
            filter: blur(60px);
            animation: auroraMove 12s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes auroraMove {
            0% {
                transform: translate(-2%, -2%) scale(1);
                opacity: 0.6;
            }
            100% {
                transform: translate(3%, 3%) scale(1.2);
                opacity: 1;
            }
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 640px;
            width: 100%;
            padding: 50px 45px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.20);
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            text-align: center;
            transition: transform 0.4s ease;
            /* ✅ 新增：入场动画 */
            animation: fadeInUp 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .title {
            font-size: 42px;
            font-weight: 700;
            color: #fff4e6;
            text-shadow: 0 0 30px rgba(255, 200, 120, 0.25);
            letter-spacing: 4px;
            margin-bottom: 8px;
            /* ✅ 新增：发光呼吸 */
            animation: glowPulse 3.5s ease-in-out infinite;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.70);
            letter-spacing: 6px;
            margin-bottom: 28px;
        }

        .divider {
            width: 80px;
            height: 3px;
            margin: 0 auto 28px auto;
            /* ✅ 修改：改为流光渐变 + 背景尺寸 */
            background: linear-gradient(90deg, #f9d976, #f39b7b, #b58cd9, #f9d976);
            background-size: 300% 100%;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(243, 155, 123, 0.30);
            /* ✅ 新增：流光动画 */
            animation: shimmerLine 4s ease-in-out infinite;
        }

        .bio {
            font-size: 16px;
            line-height: 2;
            color: rgba(255, 255, 240, 0.85);
            margin-bottom: 32px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .bio strong {
            color: #f9d976;
            font-weight: 600;
        }

        .btn-sunny {
            display: inline-block;
            padding: 14px 48px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            color: #1a2a2a;
            background: linear-gradient(135deg, #f9d976, #f39b7b);
            border: none;
            box-shadow: 0 8px 28px rgba(243, 155, 123, 0.35);
            cursor: pointer;
            transition: all 0.35s ease;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .btn-sunny:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 14px 36px rgba(243, 155, 123, 0.50);
            background: linear-gradient(135deg, #fae38a, #f4a882);
        }

        .btn-sunny:active {
            transform: translateY(1px) scale(0.98);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 13px;
            color: rgba(255, 255, 240, 0.35);
            letter-spacing: 2px;
            font-weight: 300;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 22px;
            }
            .title {
                font-size: 30px;
            }
            .subtitle {
                font-size: 14px;
                letter-spacing: 4px;
            }
            .btn-sunny {
                padding: 12px 32px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">💙 阿水的小窝 💙</h1>
        <p class="subtitle">✦ 阳光 · 极光 · 小世界 ✦</p>
        <div class="divider"></div>
        <div class="bio">
            这里是一个<strong>温暖</strong>的角落，<br>
            极光在窗外流淌，阳光在心底生长。<br>
            阿水正在用代码搭建属于自己的小宇宙。
        </div>
        <a href="home.html" class="btn-sunny">✨ 进来坐坐 ✨</a>
        <div class="footer-note">—— 极光之下，万物晴朗 ——</div>
    </div>
</body>
</html>

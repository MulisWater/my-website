<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阿水的文章</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 极光背景 ===== */
        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(72, 255, 200, 0.30) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 20%, rgba(160, 120, 255, 0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(255, 180, 120, 0.30) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 90%, rgba(100, 220, 255, 0.25) 0%, transparent 45%),
                linear-gradient(145deg, #0b2a35 0%, #1a3a45 40%, #2a4a4a 70%, #3a3a2a 100%);
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 30px 20px 60px 20px;
            min-height: 100vh;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            max-width: 1000px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .navbar .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff4e6;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .navbar .logo span {
            color: #f9d976;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 240, 0.70);
            font-weight: 500;
            font-size: 15px;
            padding: 6px 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.10);
            color: #fff4e6;
        }

        .nav-links a.active {
            background: rgba(249, 217, 118, 0.20);
            color: #f9d976;
        }

        /* ===== 页面标题 ===== */
        .page-header {
            max-width: 1000px;
            margin: 0 auto 28px auto;
            padding: 0 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header h1 {
            font-size: 34px;
            font-weight: 700;
            color: #fff4e6;
            letter-spacing: 2px;
        }

        .page-header p {
            color: rgba(255, 255, 240, 0.50);
            font-size: 15px;
            font-weight: 300;
        }

        /* ===== 博客主容器（左分类 + 右文章） ===== */
.blog-main {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    gap: 32px;
    align-items: flex-start;
}

/* ===== 左侧分类栏 ===== */
.sidebar {
    flex: 0 0 180px;          /* 固定宽度 180px，不收缩 */
    position: sticky;
    top: 100px;               /* 滚动时粘在顶部 */
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 20px 18px;
    border: 1px solid rgba(255, 255, 255, 0.06);
}

.sidebar-title {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255, 255, 240, 0.50);
    letter-spacing: 2px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

.category-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.category-list li {
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 400;
    color: rgba(255, 255, 240, 0.50);
    cursor: pointer;
    transition: all 0.3s ease;
}

.category-list li:hover {
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 240, 0.80);
}

.category-list li.active {
    background: rgba(249, 217, 118, 0.12);
    color: #f9d976;
    font-weight: 500;
}

.category-list li .count {
    float: right;
    font-size: 12px;
    opacity: 0.4;
}

/* ===== 右侧文章区域（占剩余空间） ===== */
.blog-right {
    flex: 1;
    min-width: 0;              /* 防止溢出 */
}

/* ===== 原有 .page-header 在右侧内部，调整间距 ===== */
.blog-right .page-header {
    margin: 0 0 20px 0;
    padding: 0;
}

.blog-right .page-header h1 {
    font-size: 30px;
}

/* ===== 文章网格（继承原有样式，但微调间距） ===== */
.blog-right .post-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
}

/* ===== 响应式：手机变上下排列 ===== */
@media (max-width: 768px) {
    .blog-main {
        flex-direction: column;
        gap: 20px;
    }
    .sidebar {
        flex: none;
        width: 100%;
        position: static;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 16px;
        padding: 14px 18px;
    }
    .sidebar-title {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
        font-size: 13px;
        width: 100%;
    }
    .category-list {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 4px;
    }
    .category-list li {
        padding: 4px 14px;
        font-size: 13px;
    }
    .blog-right .page-header h1 {
        font-size: 24px;
    }
    .blog-right .post-grid {
        grid-template-columns: 1fr;
    }
}

        /* ===== 文章网格 ===== */
        .post-grid {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* ===== 单篇文章卡片 ===== */
        .post-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px 26px 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .post-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.20);
            border-color: rgba(249, 217, 118, 0.20);
            background: rgba(255, 255, 255, 0.09);
        }

        .post-card .post-date {
            font-size: 12px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.35);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .post-card .post-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff4e6;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .post-card .post-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .post-card .post-tags span {
            font-size: 11px;
            font-weight: 400;
            color: rgba(249, 217, 118, 0.60);
            background: rgba(249, 217, 118, 0.08);
            padding: 2px 12px;
            border-radius: 20px;
            border: 1px solid rgba(249, 217, 118, 0.06);
        }

        .post-card .post-excerpt {
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.60);
            line-height: 1.7;
            flex: 1;
        }

        .post-card .read-more {
            margin-top: 16px;
            font-size: 13px;
            font-weight: 600;
            color: #f9d976;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .post-card:hover .read-more {
            opacity: 1;
        }

        /* ===== 文章详情（点击后展开） ===== */
        .post-detail-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.70);
            backdrop-filter: blur(20px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 30px;
            animation: fadeIn 0.3s ease;
        }

        .post-detail-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }

        .post-detail-box {
            max-width: 680px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            background: rgba(26, 42, 53, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 44px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.50);
            position: relative;
        }

        .post-detail-box::-webkit-scrollbar {
            width: 4px;
        }
        .post-detail-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .post-detail-box .close-detail {
            position: sticky;
            top: 0;
            float: right;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.30);
            cursor: pointer;
            transition: all 0.3s ease;
            background: none;
            border: none;
            font-family: inherit;
            z-index: 1;
        }

        .post-detail-box .close-detail:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        .post-detail-box .detail-date {
            font-size: 13px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.30);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .post-detail-box .detail-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff4e6;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .post-detail-box .detail-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .post-detail-box .detail-tags span {
            font-size: 12px;
            font-weight: 400;
            color: rgba(249, 217, 118, 0.50);
            background: rgba(249, 217, 118, 0.06);
            padding: 2px 14px;
            border-radius: 20px;
            border: 1px solid rgba(249, 217, 118, 0.06);
        }

        .post-detail-box .detail-content {
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 240, 0.80);
            line-height: 2;
            white-space: pre-wrap;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                padding: 14px 20px;
                border-radius: 32px;
            }
            .nav-links {
                gap: 8px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-links a {
                font-size: 14px;
                padding: 4px 14px;
            }
            .page-header h1 {
                font-size: 26px;
            }
            .post-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .post-detail-box {
                padding: 28px 22px;
                max-height: 90vh;
            }
            .post-detail-box .detail-title {
                font-size: 22px;
            }
            .post-detail-box .detail-content {
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            .post-detail-overlay {
                padding: 12px;
            }
            .post-detail-box {
                padding: 20px 16px;
                border-radius: 24px;
            }
            .post-detail-box .detail-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏 ===== -->
    <nav class="navbar">
        <a href="index.html" class="logo">☀️ 阿水<span>的小窝</span></a>
        <ul class="nav-links">
            <li><a href="home.html">首页</a></li>
            <li><a href="muliswater.html" class="active">文章</a></li>
            <li><a href="photos.html">照片墙</a></li>
        </ul>
    </nav>

    <!-- ===== 页面标题 ===== -->
    <!-- ===== 主内容区（左侧分类 + 右侧文章） ===== -->
<div class="blog-main">
    <!-- 左侧分类栏 -->
    <aside class="sidebar">
        <div class="sidebar-title">📂 分类</div>
        <ul class="category-list" id="categoryList">
            <!-- JS 会动态生成 -->
        </ul>
    </aside>

    <!-- 右侧文章区域 -->
    <div class="blog-right">
        <div class="page-header">
            <div>
                <h1>📝 文章</h1>
                <p id="categoryLabel">全部文章</p>
            </div>
        </div>
        <div class="post-grid" id="postGrid"></div>
    </div>
</div>
    <!-- ===== 文章详情弹窗 ===== -->
    <div class="post-detail-overlay" id="detailOverlay">
        <div class="post-detail-box">
            <button class="close-detail" id="closeDetail">✕</button>
            <div class="detail-date" id="detailDate"></div>
            <div class="detail-title" id="detailTitle"></div>
            <div class="detail-tags" id="detailTags"></div>
            <div class="detail-content" id="detailContent"></div>
        </div>
    </div>

    <!-- ========================================
    JavaScript
    ======================================== -->
    <script>
        // ========================================
        // 1. 文章数据
        // ========================================
        // ========================================
// 1. 文章数据（从 JSON 文件加载）
// ========================================
var posts = [];
var currentCategory = 'all';

function loadPosts() {
    // 使用 GitHub API 获取 _posts 文件夹的文件列表
    fetch('https://api.github.com/repos/MulisWater/my-website/contents/_posts')
        .then(function(response) {
            if (!response.ok) throw new Error('无法获取文章列表');
            return response.json();
        })
        .then(function(files) {
            // 过滤出 .md 文件，并按文件名排序（最新的在前）
            var mdFiles = files
                .filter(function(file) { return file.name.endsWith('.md'); })
                .sort(function(a, b) { return b.name.localeCompare(a.name); });
            
            if (mdFiles.length === 0) {
                document.getElementById('postGrid').innerHTML = '<div style="text-align:center;color:rgba(255,255,240,0.3);padding:40px;">📭 还没有文章</div>';
                return;
            }
            
            // 逐个读取每个 .md 文件的内容
            var fetchPromises = mdFiles.map(function(file) {
                return fetch(file.download_url)
                    .then(function(res) { return res.text(); })
                    .then(function(content) {
                        return parseMarkdownFile(content, file.name);
                    });
            });
            
            return Promise.all(fetchPromises);
        })
        .then(function(posts) {
            if (!posts) return;
            // 存储到全局变量并渲染
            window.posts = posts;
            renderPosts('all');
        })
        .catch(function(error) {
            console.error('加载文章失败:', error);
            document.getElementById('postGrid').innerHTML = '<div style="text-align:center;color:rgba(255,255,240,0.3);padding:40px;">⚠️ 加载失败，请检查网络</div>';
        });
}

function parseMarkdownFile(content, filename) {
    // 解析 front matter（--- 包裹的部分）
    var frontMatter = {};
    var body = content;
    var match = content.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
    
    if (match) {
        // 解析 YAML 格式的 front matter
        var yamlLines = match[1].split('\n');
        yamlLines.forEach(function(line) {
            var colonIndex = line.indexOf(':');
            if (colonIndex > 0) {
                var key = line.substring(0, colonIndex).trim();
                var value = line.substring(colonIndex + 1).trim();
                frontMatter[key] = value;
            }
        });
        body = match[2].trim();
    }
    
    // 从文件名提取日期（如果 front matter 没有日期）
    var date = frontMatter.date || filename.substring(0, 10);
    
    // 用 marked 解析 Markdown 为 HTML
    var htmlContent = marked.parse(body);
    
    return {
        id: Date.now() + Math.random(),
        title: frontMatter.title || filename.replace(/\.md$/, ''),
        date: date,
        tags: frontMatter.tags ? frontMatter.tags.split(',').map(function(t) { return t.trim(); }) : ['未分类'],
        excerpt: frontMatter.excerpt || body.substring(0, 60).replace(/\n/g, ' ') + '...',
        content: htmlContent,
        rawContent: body
    };
}
        var grid = document.getElementById('postGrid');

        // ========================================
// 2. 分类逻辑
// ========================================
// 从文章中提取所有标签，去重
var allTags = [];
posts.forEach(function(p) {
    p.tags.forEach(function(t) {
        if (allTags.indexOf(t) === -1) allTags.push(t);
    });
});
allTags.sort();

// 渲染分类列表
var categoryList = document.getElementById('categoryList');
var categoryLabel = document.getElementById('categoryLabel');

// 先清空
categoryList.innerHTML = '';

// 添加“全部”
var allLi = document.createElement('li');
allLi.className = 'active';
allLi.textContent = '全部文章';
allLi.dataset.tag = 'all';
allLi.addEventListener('click', function() {
    filterPosts('all');
});
categoryList.appendChild(allLi);

// 添加每个标签
allTags.forEach(function(tag) {
    var li = document.createElement('li');
    li.textContent = tag;
    li.dataset.tag = tag;
    // 计算该标签下的文章数
    var count = posts.filter(function(p) { return p.tags.indexOf(tag) !== -1; }).length;
    var countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.textContent = count;
    li.appendChild(countSpan);
    li.addEventListener('click', function() {
        filterPosts(tag);
    });
    categoryList.appendChild(li);
});

// 当前选中的分类
var currentCategory = 'all';

function filterPosts(tag) {
    currentCategory = tag;
    // 更新分类高亮
    var items = categoryList.querySelectorAll('li');
    items.forEach(function(item) {
        item.classList.toggle('active', item.dataset.tag === tag);
    });
    // 更新标题
    if (tag === 'all') {
        categoryLabel.textContent = '全部文章';
    } else {
        categoryLabel.textContent = '分类：' + tag;
    }
    // 重新渲染文章（过滤）
    renderPosts(tag);
}

// 修改渲染函数，增加过滤参数
function renderPosts(tag) {
    var filtered = window.posts;
    if (tag && tag !== 'all') {
        filtered = posts.filter(function(p) {
            return p.tags.indexOf(tag) !== -1;
        });
    }
    var grid = document.getElementById('postGrid');
    
    // 清空网格
    grid.innerHTML = '';
    // 如果没文章
    if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:rgba(255,255,240,0.2);padding:40px 0;">暂无该分类下的文章</div>';
        return;
    }
    // 渲染每篇文章（用之前的 card 渲染逻辑）
    filtered.forEach(function(post) {
        var card = document.createElement('div');
        card.className = 'post-card';
        card.dataset.id = post.id;
        card.innerHTML = `
            <div class="post-date">${post.date}</div>
            <div class="post-title">${post.title}</div>
            <div class="post-tags">${post.tags.map(function(t) { return '<span>' + t + '</span>'; }).join('')}</div>
            <div class="post-excerpt">${post.excerpt}</div>
            <div class="read-more">阅读全文 →</div>
        `;
        card.addEventListener('click', function() {
            openDetail(post.id);
        });
        grid.appendChild(card);
    });
}

// 把原先渲染文章列表的代码（`posts.forEach` 那段）删掉，改成调用 renderPosts('all')
// 也就是在 posts 数组定义之后，直接执行：

loadPosts();



        // ========================================
        // 3. 文章详情弹窗
        // ========================================
        var overlay = document.getElementById('detailOverlay');
        var closeBtn = document.getElementById('closeDetail');
        var detailDate = document.getElementById('detailDate');
        var detailTitle = document.getElementById('detailTitle');
        var detailTags = document.getElementById('detailTags');
        var detailContent = document.getElementById('detailContent');

        function openDetail(id) {
            var post = posts.find(function(p) { return p.id === id; });
            if (!post) return;

            detailDate.textContent = post.date;
            detailTitle.textContent = post.title;
            detailTags.innerHTML = post.tags.map(function(t) { return '<span>' + t + '</span>'; }).join('');
            detailContent.innerHTML = post.content;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetailFn() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        closeBtn.addEventListener('click', closeDetailFn);

        overlay.addEventListener('click', function(e) {
            if (e.target === this) {
                closeDetailFn();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeDetailFn();
            }
        });
        
    </script>
</body>
